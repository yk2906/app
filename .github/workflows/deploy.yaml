name: Build and Deploy to k3s

on:
  push:
    branches: [ "main" ]
    paths:
      - 'steam-bot/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/steam-bot
  MANIFEST_REPO: ${{ github.repository_owner }}/infra

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout App Repo
        uses: actions/checkout@v4

      - name: Generate GitHub App Token
        id: generate_token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ vars.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Build and push Docker image
        uses: ./.github/actions/docker-build-push-ghcr
        with:
          context: ./steam-bot
          registry: ${{ env.REGISTRY }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Kubernetes manifests
        run: |
          # ManifestリポジトリをApp Tokenを使ってクローン
          git clone https://x-access-token:${{ steps.generate_token.outputs.token }}@github.com/${{ env.MANIFEST_REPO }}.git infra
          ls
          cd infra/kubernetes/steam-bot/overlays/prod
          
          # Kustomizeでイメージタグを最新のコミットハッシュに書き換え
          # (kubectlに同梱されているので、kustomizeコマンドが使えます)
          kustomize edit set image steam-bot-image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          
          # Git Push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy steam-bot: ${{ github.sha }}"
          git push