name: Build and Deploy to k3s

on:
  push:
    branches: [ "main" ]
    paths:
      - 'steam-bot/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/steam-bot
  MANIFEST_REPO: ${{ github.repository_owner }}/infra

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout App Repo
        uses: actions/checkout@v4

      - name: Generate GitHub App Token
        id: generate_token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Update Kubernetes manifests
        run: |
          # ManifestリポジトリをApp Tokenを使ってクローン
          git clone https://x-access-token:${{ steps.generate_token.outputs.token }}@github.com/${{ env.MANIFEST_REPO }}.git manifest-repo
          cd manifest-repo/steam-bot/overlays/oci-prod
          
          # Kustomizeでイメージタグを最新のコミットハッシュに書き換え
          # (kubectlに同梱されているので、kustomizeコマンドが使えます)
          kustomize edit set image steam-bot-image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          
          # Git Push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy steam-bot: ${{ github.sha }}"
          git push