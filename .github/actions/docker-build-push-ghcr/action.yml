name: Docker build and push to GHCR
description: QEMU・Buildx・GHCR ログインを行い、マルチプラットフォームでビルドしてプッシュする

inputs:
  context:
    description: Docker ビルドコンテキストのパス
    required: true
  tags:
    description: イメージタグ（複数行可）
    required: true
  registry:
    description: レジストリホスト名
    required: false
    default: ghcr.io
  platforms:
    description: 対象プラットフォーム（カンマ区切り）
    required: false
    default: linux/amd64,linux/arm64
  push:
    description: レジストリへプッシュするか
    required: false
    default: "true"
  github_token:
    description: レジストリログイン用トークン（通常は secrets.GITHUB_TOKEN）
    required: true

runs:
  using: composite
  steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ github.actor }}
        password: ${{ inputs.github_token }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: ${{ inputs.context }}
        platforms: ${{ inputs.platforms }}
        push: ${{ inputs.push == 'true' }}
        tags: ${{ inputs.tags }}
